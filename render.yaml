services:
  - type: web
    name: mandaca-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python create_tables.py"
    startCommand: "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MESSAGE_BUFFER_SECONDS
        value: "20"
      - key: CORS_ORIGINS
        value: "https://agro-beyond.vercel.app"
