services:
  db:
    image: postgres:15
    container_name: agro_db
    restart: always
    environment:
      - POSTGRES_USER: ${DB_USER}
      - POSTGRES_PASSWORD:  ${DB_PASSWORD}
      - POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

  redis:
    image: redis:alpine
    container_name: agroflow-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: agroflow-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - CONFIG_SESSION_PHONE_CLIENT=AgroFlow
      - AUTHENTICATION_API_KEY=${AUTH_API_KEY}
      
      
      - REDIS_URI=redis://redis:6379
      - REDIS_PREFIX_KEY=evolution
      
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:8000/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_EVENTS=APPLICATION_STARTUP,QRCODE_UPDATED,MESSAGES_UPSERT
    depends_on:
      - redis